services:

  # ── Backend — FastAPI + chaos engine ────────────────────────────────────────
  backend:
    build: .
    image: kairos-backend
    container_name: kairos-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    # Mount model weights at runtime so you don't have to rebuild when retraining
    volumes:
      - ./ml/models:/app/ml/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend — React / Vite dev server (local development only) ───────────
  frontend:
    image: node:20-alpine
    container_name: kairos-frontend
    working_dir: /app
    volumes:
      # Mount source for hot-module replacement
      - .:/app
      # Isolate node_modules inside container
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      # Points browser requests at the backend exposed on the host
      - VITE_BACKEND_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
